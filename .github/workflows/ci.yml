name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workindex_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:migrations
      - name: Apply migrations
        working-directory: .
        env:
          PGPASSWORD: postgres
        run: for file in infra/postgres/migrations/*.sql; do psql -h 127.0.0.1 -U postgres -d workindex_test -v ON_ERROR_STOP=1 -f "$file"; done
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          WORKINDEX_DATA_MODE: fixture
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=chromium
